<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>QR Studio</title>

<meta name="theme-color" content="#111827">

<link rel="manifest" href="manifest.webmanifest">
<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/qr-code-styling@1.9.2/lib/qr-code-styling.js"></script>

</head>
<body>

<main class="app">

<header class="hero">
<h1>QR Studio</h1>
<p>Skapa QR-koder direkt på iPhone</p>
</header>

<section class="panel">

<div class="card">

<h2>QR-inställningar</h2>

<label>Namn</label>
<input id="qrName" type="text" placeholder="Exempel: Mässmonter">

<label>Typ</label>
<select id="type">
<option value="url">URL</option>
<option value="text">Text</option>
<option value="phone">Telefon</option>
<option value="email">E-post</option>
<option value="sms">SMS</option>
<option value="whatsapp">WhatsApp</option>
<option value="vcard">Kontaktkort</option>
<option value="wifi">Wi-Fi</option>
</select>

<div id="dynamicFields"></div>

<label>Storlek</label>
<input id="size" type="range" min="160" max="320" value="220">
<div class="meta-row">
<span>Storlek</span>
<strong><span id="sizeValue">220</span> px</strong>
</div>

<div class="color-grid">

<div>
<label>QR-färg</label>
<input id="foregroundColor" type="color" value="#111111">
</div>

<div>
<label>Bakgrund</label>
<input id="backgroundColor" type="color" value="#ffffff">
</div>

</div>

<label>Logotyp</label>
<input id="logoUpload" type="file" accept="image/png,image/jpeg,image/svg+xml">

<label>Logotypstorlek</label>
<input id="logoSize" type="range" min="10" max="40" value="25">

<div class="meta-row">
<span>Storlek</span>
<strong><span id="logoSizeValue">25</span>%</strong>
</div>

<button id="removeLogoBtn">Ta bort logotyp</button>

<button id="saveBtn">Spara QR-kod</button>

</div>


<div class="card preview-card">

<h2>Förhandsvisning</h2>

<div id="qrWrapper">
<div id="qrcode"></div>
</div>

<button id="downloadBtn">Ladda ner PNG</button>
<button id="downloadSvgBtn">Ladda ner SVG</button>

</div>

</section>


<section class="card history-card">

<div class="history-header">
<h2>Historik</h2>
<button id="clearHistoryBtn">Rensa historik</button>
</div>

<div id="historyList"></div>

</section>

</main>


<div id="toastContainer" class="toast-container"></div>


<!-- BEKRÄFTELSEMODAL -->

<div id="confirmModal" class="modal-backdrop" hidden>

<div class="modal-card">

<h3 id="confirmModalTitle">Bekräfta</h3>

<p id="confirmModalMessage">Är du säker?</p>

<div class="modal-actions">

<button id="confirmCancelBtn">Avbryt</button>

<button id="confirmOkBtn">Fortsätt</button>

</div>

</div>

</div>


<script src="app.js"></script>

</body>
</html>
