<!DOCTYPE html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>QR Studio</title>

    <meta name="theme-color" content="#111827" />
    <meta
      name="description"
      content="Skapa QR-koder för länkar, text, telefon, e-post och Wi-Fi."
    />

    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="QR Studio" />

    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="apple-touch-icon" href="icon-192.svg" />
    <link rel="stylesheet" href="style.css" />

    <script src="https://cdn.jsdelivr.net/npm/qr-code-styling@1.9.2/lib/qr-code-styling.js"></script>
  </head>
  <body>
    <main class="app">
      <section class="hero">
        <div class="hero-top">
          <div>
            <p class="eyebrow">QR Studio</p>
            <h1>Skapa QR-koder direkt på iPhone</h1>
            <p class="hero-text">
              Generera QR-koder för länkar, text, telefon, e-post och Wi-Fi.
            </p>
          </div>

          <div id="networkBadge" class="network-badge online">Online</div>
        </div>
      </section>

      <section class="panel">
        <div class="card">
          <h2>Inställningar</h2>

          <label for="type">Typ</label>
          <select id="type">
            <option value="url">URL</option>
            <option value="text">Text</option>
            <option value="phone">Telefon</option>
            <option value="email">E-post</option>
            <option value="wifi">Wi-Fi</option>
          </select>

          <div id="dynamicFields"></div>

          <label for="size">Storlek</label>
          <input
            id="size"
            type="range"
            min="160"
            max="320"
            step="10"
            value="220"
          />
          <div class="meta-row">
            <span>Storlek</span>
            <strong><span id="sizeValue">220</span> px</strong>
          </div>

          <div class="color-grid">
            <div>
              <label for="foregroundColor">QR-färg</label>
              <input id="foregroundColor" type="color" value="#111111" />
            </div>

            <div>
              <label for="backgroundColor">Bakgrund</label>
              <input id="backgroundColor" type="color" value="#ffffff" />
            </div>
          </div>

          <button id="saveBtn" class="secondary-btn">Spara i historik</button>
          <p id="error" class="error"></p>

          <p class="helper install-tip">
            I Safari: tryck på <strong>Dela</strong> och välj
            <strong>Lägg till på hemskärmen</strong>.
          </p>
        </div>

        <div class="card preview-card">
          <div class="preview-header">
            <h2>Förhandsvisning</h2>
            <span class="badge">PNG + SVG</span>
          </div>

          <div id="qrWrapper">
            <div id="qrcode"></div>
          </div>

          <div class="action-group stacked-actions">
            <button id="downloadBtn" class="primary-btn">Ladda ner PNG</button>
            <button id="downloadSvgBtn" class="secondary-btn">
              Ladda ner SVG
            </button>
            <button id="shareBtn" class="ghost-btn wide-btn">
              Dela QR-kod
            </button>
          </div>
        </div>
      </section>

      <section class="card history-card">
        <div class="history-header">
          <h2>Historik</h2>
          <button id="clearHistoryBtn" class="ghost-btn">
            Rensa historik
          </button>
        </div>

        <div id="historyList" class="history-list">
          <p class="empty-state">Ingen historik ännu.</p>
        </div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
