<!DOCTYPE html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QR Studio</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  </head>
  <body>
    <main class="app">
      <section class="hero">
        <p class="eyebrow">QR Studio</p>
        <h1>Skapa QR-koder direkt på iPhone</h1>
        <p class="hero-text">
          Generera QR-koder för länkar, text, telefon, e-post och Wi-Fi.
        </p>
      </section>

      <section class="panel">
        <div class="card">
          <h2>Inställningar</h2>

          <label for="type">Typ</label>
          <select id="type">
            <option value="url">URL</option>
            <option value="text">Text</option>
            <option value="phone">Telefon</option>
            <option value="email">E-post</option>
            <option value="wifi">Wi-Fi</option>
          </select>

          <div id="dynamicFields"></div>

          <label for="size">Storlek</label>
          <input id="size" type="range" min="160" max="320" step="10" value="220" />
          <div class="meta-row">
            <span>Storlek</span>
            <strong><span id="sizeValue">220</span> px</strong>
          </div>

          <div class="color-grid">
            <div>
              <label for="foregroundColor">QR-färg</label>
              <input id="foregroundColor" type="color" value="#111111" />
            </div>

            <div>
              <label for="backgroundColor">Bakgrund</label>
              <input id="backgroundColor" type="color" value="#ffffff" />
            </div>
          </div>

          <button id="generateBtn" class="primary-btn">Generera QR-kod</button>
          <p id="error" class="error"></p>
        </div>

        <div class="card preview-card">
          <div class="preview-header">
            <h2>Förhandsvisning</h2>
            <span class="badge">PNG</span>
          </div>

          <div id="qrWrapper">
            <div id="qrcode"></div>
          </div>

          <div class="action-group">
            <button id="downloadBtn" class="primary-btn">Ladda ner PNG</button>
          </div>
        </div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
