<!DOCTYPE html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline - QR Studio</title>
    <style>
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #f3f4f6;
        color: #111827;
        display: grid;
        place-items: center;
        min-height: 100vh;
        padding: 24px;
      }

      .card {
        width: 100%;
        max-width: 420px;
        background: white;
        border-radius: 24px;
        padding: 24px;
        box-shadow: 0 20px 40px rgba(17, 24, 39, 0.08);
        text-align: center;
      }

      h1 {
        margin-top: 0;
        margin-bottom: 12px;
      }

      p {
        color: #6b7280;
        line-height: 1.5;
      }

      a {
        display: inline-block;
        margin-top: 16px;
        padding: 12px 16px;
        border-radius: 14px;
        background: #111827;
        color: white;
        text-decoration: none;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Du är offline</h1>
      <p>
        QR Studio fungerar delvis offline om appen redan har cachelagrats.
        Anslut till internet och öppna appen igen om något saknas.
      </p>
      <a href="./index.html">Försök igen</a>
    </div>
  </body>
</html>
